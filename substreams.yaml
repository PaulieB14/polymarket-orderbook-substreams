specVersion: v0.1.0
package:
  name: polymarket_orderbook_substreams
  version: v0.4.0
  url: https://github.com/PaulieB14/polymarket-orderbook-substreams
  image: ./download.png
  doc: |
    # Polymarket Orderbook Substreams

    Real-time orderbook event extraction for Polymarket prediction markets on Polygon.

    Features:
    - Order fill extraction from CTF Exchange and Neg Risk Exchange (v1 + v2)
    - Orders matched event tracking across both v1 and v2 contracts
    - Unified order flow stream spanning the 2026-04-28 v2 cutover
    - Price calculation and explicit trade side from v2 `side` enum
    - V2 builder attribution and metadata surfaced as columns

    SQL schemas included for PostgreSQL and Clickhouse persistence.

network: polygon

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v3.0.0/substreams-sink-database-changes-v3.0.0.spkg
  sql: https://github.com/streamingfast/substreams-sink-sql/releases/download/protodefs-v1.0.7/substreams-sink-sql-protodefs-v1.0.7.spkg

protobuf:
  files:
    - polymarket/orderbook/v1/orderbook.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/polymarket_orderbook_substreams.wasm

modules:
  # ============================================
  # Event Extraction Modules (Layer 1)
  # ============================================

  - name: map_ctf_exchange_order_filled
    kind: map
    initialBlock: 57000000
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrderFilledEvents
    doc: |
      Extracts OrderFilled events from CTF Exchange (0x4bfb41d5b3570defd03c39a9a4d8de6bd8b8982e).
      Includes price calculation and trade side determination.

  - name: map_neg_risk_exchange_order_filled
    kind: map
    initialBlock: 57000000
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrderFilledEvents
    doc: |
      Extracts OrderFilled events from Neg Risk Exchange (0xC5d563A36AE78145C45a50134d48A1215220f80a).
      Handles negative risk markets with specialized processing.

  - name: map_ctf_exchange_orders_matched
    kind: map
    initialBlock: 57000000
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrdersMatchedEvents
    doc: Extracts OrdersMatched events from CTF Exchange.

  - name: map_neg_risk_exchange_orders_matched
    kind: map
    initialBlock: 57000000
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrdersMatchedEvents
    doc: Extracts OrdersMatched events from Neg Risk Exchange.

  # ============================================
  # V2 Event Extraction (deployed 2026-03-31, cutover 2026-04-28)
  # ============================================

  - name: map_ctf_exchange_v2_order_filled
    kind: map
    initialBlock: 84902353
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrderFilledEvents
    doc: |
      Extracts OrderFilled events from CTF Exchange V2 (0xE111180000d2663C0091e4f400237545B87B996B).
      V2 events emit explicit side, single tokenId, plus builder/metadata fields.

  - name: map_neg_risk_exchange_v2_order_filled
    kind: map
    initialBlock: 84902353
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrderFilledEvents
    doc: Extracts OrderFilled events from Neg Risk CTF Exchange V2 (0xe2222d279d744050d28e00520010520000310F59).

  - name: map_ctf_exchange_v2_orders_matched
    kind: map
    initialBlock: 84902353
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrdersMatchedEvents
    doc: Extracts OrdersMatched events from CTF Exchange V2.

  - name: map_neg_risk_exchange_v2_orders_matched
    kind: map
    initialBlock: 84902353
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:polymarket.orderbook.v1.OrdersMatchedEvents
    doc: Extracts OrdersMatched events from Neg Risk CTF Exchange V2.

  # ============================================
  # Combined Events Module (Layer 1.5)
  # ============================================

  - name: map_all_order_fills
    kind: map
    initialBlock: 57000000
    inputs:
      - map: map_ctf_exchange_order_filled
      - map: map_neg_risk_exchange_order_filled
      - map: map_ctf_exchange_v2_order_filled
      - map: map_neg_risk_exchange_v2_order_filled
    output:
      type: proto:polymarket.orderbook.v1.OrderFilledEvents
    doc: |
      Combines order fills from v1 and v2 CTF Exchange + Neg Risk into a single stream.
      Use this module for unified order flow analysis spanning the v2 cutover.

  # ============================================
  # Foundational Stores (Layer 2)
  # ============================================

  - name: store_markets
    kind: store
    initialBlock: 57000000
    updatePolicy: set
    valueType: proto:polymarket.orderbook.v1.MarketOrderbook
    inputs:
      - map: map_all_order_fills
    doc: Stores market-level statistics indexed by asset ID.

  - name: store_traders
    kind: store
    initialBlock: 57000000
    updatePolicy: set
    valueType: proto:polymarket.orderbook.v1.Account
    inputs:
      - map: map_all_order_fills
    doc: Stores trader-level statistics indexed by address.

  - name: store_global_stats
    kind: store
    initialBlock: 57000000
    updatePolicy: set
    valueType: proto:polymarket.orderbook.v1.GlobalOrderbookStats
    inputs:
      - map: map_all_order_fills
    doc: Stores global platform statistics.

  # ============================================
  # Analytics Outputs (Layer 3)
  # ============================================

  - name: map_market_orderbooks
    kind: map
    initialBlock: 57000000
    inputs:
      - map: map_all_order_fills
      - store: store_markets
        mode: deltas
    output:
      type: proto:polymarket.orderbook.v1.MarketOrderbooks
    doc: Emits market orderbook updates when markets change.

  - name: map_trader_accounts
    kind: map
    initialBlock: 57000000
    inputs:
      - map: map_all_order_fills
      - store: store_traders
        mode: deltas
    output:
      type: proto:polymarket.orderbook.v1.Accounts
    doc: Emits trader account updates for leaderboards.

  - name: map_global_orderbook_stats
    kind: map
    initialBlock: 57000000
    inputs:
      - map: map_all_order_fills
      - store: store_global_stats
        mode: deltas
    output:
      type: proto:polymarket.orderbook.v1.GlobalOrderbookStats
    doc: Emits global platform statistics.

  # ============================================
  # Database Sink Output (Layer 4)
  # ============================================

  - name: db_out
    kind: map
    initialBlock: 57000000
    inputs:
      - map: map_all_order_fills
      - map: map_market_orderbooks
      - map: map_trader_accounts
      - map: map_global_orderbook_stats
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
    doc: |
      Converts all analytics outputs into DatabaseChanges for PostgreSQL/ClickHouse.
      Use with substreams-sink-sql to persist data.

sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: "./schema.sql"
    engine: postgres
